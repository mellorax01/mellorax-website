<!DOCTYPE html>
<html lang="en">
   
<style>
.mx-cart-page{
    background:#0B0B0B;
    color:#F9F7F2;
    min-height:100vh;
    padding:110px 6% 90px;
}

.mx-cart-hero{
    max-width:760px;
    margin-bottom:56px;
}

.mx-cart-hero span,
.summary-kicker{
    color:#D4AF37;
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
}

.mx-cart-hero h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(52px,8vw,92px);
    line-height:1;
    margin:14px 0 18px;
}

.mx-cart-hero p{
    color:#AFA79A;
    line-height:1.8;
}

.mx-cart-layout{
    display:grid;
    grid-template-columns:1.35fr .65fr;
    gap:36px;
    align-items:start;
}

.mx-cart-items{
    display:grid;
    gap:22px;
}

.mx-cart-item{
    display:grid;
    grid-template-columns:150px 1fr auto;
    gap:28px;
    align-items:center;
    padding:28px;
    border-radius:34px;
    background:linear-gradient(180deg,#151515,#0E0E0E);
    border:1px solid rgba(212,175,55,.14);
    box-shadow:0 26px 85px rgba(0,0,0,.36);
}

.cart-image-wrap{
    width:150px;
    height:150px;
    border-radius:26px;
    background:#090909;
    display:flex;
    align-items:center;
    justify-content:center;
}

.cart-image-wrap img{
    width:90%;
    height:90%;
    object-fit:contain;
}

.cart-product-info span{
    color:#D4AF37;
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
}

.cart-product-info h2{
    font-family:'Playfair Display',serif;
    font-size:34px;
    margin:8px 0;
    color:#F9F7F2;
}

.cart-product-info p{
    color:#AFA79A;
    margin:0;
}

.cart-qty{
    display:flex;
    width:145px;
    margin-top:20px;
    border:1px solid rgba(212,175,55,.24);
    border-radius:999px;
    overflow:hidden;
}

.cart-qty button,
.cart-qty input{
    width:48px;
    height:44px;
    border:0;
    background:#111;
    color:#F9F7F2;
    text-align:center;
    font-size:15px;
}

.cart-qty button{
    cursor:pointer;
    transition:.3s ease;
}

.cart-qty button:hover{
    background:rgba(212,175,55,.12);
    color:#D4AF37;
}

.cart-price-box{
    text-align:right;
}

.cart-price-box strong{
    display:block;
    font-size:28px;
    color:#F9F7F2;
}

.cart-price-box del{
    display:block;
    color:#777;
    font-size:14px;
    margin-top:4px;
}

.cart-price-box button{
    margin-top:14px;
    border:0;
    background:transparent;
    color:#D4AF37;
    font-size:13px;
    cursor:pointer;
    opacity:.75;
}

.cart-price-box button:hover{
    opacity:1;
}

.mx-cart-summary{
    position:sticky;
    top:28px;
    padding:34px;
    border-radius:34px;
    background:linear-gradient(180deg,#151515,#0E0E0E);
    border:1px solid rgba(212,175,55,.15);
    box-shadow:0 30px 90px rgba(0,0,0,.38);
}

.mx-cart-summary h3{
    font-family:'Playfair Display',serif;
    font-size:32px;
    margin:10px 0 26px;
}

.summary-lines p,
.cart-total{
    display:flex;
    justify-content:space-between;
    gap:20px;
    color:#BEB6A8;
    line-height:1.7;
}

.mx-cart-summary strong{
    color:#F9F7F2;
}

.free-text,
#cartDiscount{
    color:#D4AF37 !important;
}

.mx-cart-summary hr{
    border:0;
    border-top:1px solid rgba(212,175,55,.14);
    margin:26px 0;
}

.cart-total strong{
    color:#D4AF37;
    font-size:28px;
}

.cart-note{
    display:block !important;
    margin:24px 0;
    color:#D8C99A !important;
    font-size:13px;
    line-height:1.8;
}

.cart-checkout-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:17px 22px;
    border-radius:999px;
    background:#D4AF37;
    color:#0B0B0B;
    text-decoration:none;
    font-weight:700;
    letter-spacing:.35px;
    transition:transform .35s ease, box-shadow .35s ease;
}

.cart-checkout-btn:hover{
    transform:translateY(-5px);
    box-shadow:0 18px 42px rgba(212,175,55,.28);
}

.cart-continue{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#D4AF37;
    text-decoration:none;
    font-size:14px;
    transition:opacity .35s ease, transform .35s ease;
}

.cart-continue:hover{
    opacity:.75;
    transform:translateY(-2px);
}

.empty-cart{
    padding:44px;
    border-radius:34px;
    background:linear-gradient(180deg,#151515,#0E0E0E);
    border:1px solid rgba(212,175,55,.14);
}

.empty-cart h2{
    font-family:'Playfair Display',serif;
    font-size:42px;
}

.empty-cart p{
    color:#AFA79A;
}

.empty-cart a{
    display:inline-flex;
    margin-top:18px;
    padding:14px 22px;
    border-radius:999px;
    background:#D4AF37;
    color:#0B0B0B;
    text-decoration:none;
    font-weight:700;
}

@media(max-width:900px){

    .mx-cart-page{
        padding:92px 18px 60px;
    }

    .mx-cart-layout{
        grid-template-columns:1fr;
    }

    .mx-cart-item{
        grid-template-columns:100px 1fr;
        gap:18px;
        padding:20px;
    }

    .cart-image-wrap{
        width:100px;
        height:100px;
    }

    .cart-product-info h2{
        font-size:26px;
    }

    .cart-price-box{
        grid-column:2;
        text-align:left;
    }

    .mx-cart-summary{
        position:static;
    }
}
</style>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>MelloraX Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<script>
function goToCheckout(){
    const cart = JSON.parse(localStorage.getItem("melloraxCart") || "[]");

    if(!cart.length){
        alert("Your cart is empty.");
        return;
    }

    localStorage.setItem("melloraxCheckout", JSON.stringify({
        source:"cart",
        createdAt:Date.now(),
        items:cart
    }));

    window.location.href = "checkout.html";
}
</script>

<body>

<a href="sidr-honey.html" class="mx-back-home">← Product</a>

<main class="mx-cart-page">

<section class="mx-cart-hero">
    <span>Your Selection</span>
    <h1>Your Cart</h1>
    <p>Review your MelloraX order before moving to secure checkout.</p>
</section>

<section class="mx-cart-layout">

    <div class="mx-cart-items" id="cartItems"></div>

    <aside class="mx-cart-summary">

        <span class="summary-kicker">Order Summary</span>
        <h3>Secure Checkout</h3>

        <div class="summary-lines">
            <p><span>Subtotal</span><strong id="cartSubtotal">₹0</strong></p>
            <p><span>Shipping</span><strong class="free-text">Free</strong></p>
            <p><span>You Save</span><strong id="cartDiscount">₹0</strong></p>
        </div>

        <hr>

        <p class="cart-total">
            <span>Total</span>
            <strong id="cartTotal">₹0</strong>
        </p>

        <p class="cart-note">
            Shipping begins after the official batch launch on <strong>13 June 2026</strong>.
        </p>

   <button type="button" class="cart-checkout-btn" onclick="goToCheckout()">
    Proceed to Checkout
</button>
        <a href="products.html" class="cart-continue">
            Continue Shopping
        </a>

    </aside>

</section>

</main>

<script>
let cart = JSON.parse(localStorage.getItem("melloraxCart")) || [];

if(cart.length === 0){
    cart = [{
        id:"sidr-honey-500g",
        name:"Sidr Honey",
        brand:"MelloraX",
        variant:"500g • Batch MX-SD-001",
        price:599,
        mrp:749,
        qty:1,
        image:"assets/product-1.jpg"
    }];
}

function renderCart(){
    const cartItems = document.getElementById("cartItems");

    cartItems.innerHTML = cart.map((item, index) => `
        <article class="mx-cart-item">

            <div class="cart-image-wrap">
                <img src="${item.image}" alt="${item.name}">
            </div>

            <div class="cart-product-info">
                <span>${item.brand} • First Batch</span>
                <h2>${item.name}</h2>
                <p>${item.variant}</p>

                <div class="cart-qty">
                    <button type="button" onclick="changeQty(${index}, -1)">−</button>
                    <input value="${item.qty}" readonly>
                    <button type="button" onclick="changeQty(${index}, 1)">+</button>
                </div>
            </div>

            <div class="cart-price-box">
                <strong>₹${item.price * item.qty}</strong>
                <del>₹${item.mrp * item.qty}</del>
                <button type="button" onclick="removeItem(${index})">Remove</button>
            </div>

        </article>
    `).join("");

    const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    const mrpTotal = cart.reduce((sum, item) => sum + item.mrp * item.qty, 0);
    const discount = mrpTotal - subtotal;

    document.getElementById("cartSubtotal").innerText = `₹${subtotal}`;
    document.getElementById("cartDiscount").innerText = `₹${discount}`;
    document.getElementById("cartTotal").innerText = `₹${subtotal}`;

    localStorage.setItem("melloraxCart", JSON.stringify(cart));
}

function changeQty(index, change){
    cart[index].qty += change;

    if(cart[index].qty < 1){
        cart[index].qty = 1;
    }

    renderCart();
}

function removeItem(index){
    cart.splice(index, 1);

    if(cart.length === 0){
        localStorage.removeItem("melloraxCart");

        document.getElementById("cartItems").innerHTML = `
            <div class="empty-cart">
                <h2>Your cart is empty</h2>
                <p>Return to the product page to explore MelloraX collections.</p>
                <a href="products.html">View Products</a>
            </div>
        `;

        document.getElementById("cartSubtotal").innerText = "₹0";
        document.getElementById("cartDiscount").innerText = "₹0";
        document.getElementById("cartTotal").innerText = "₹0";
        return;
    }

    renderCart();
}

renderCart();
</script>
<script src="search.js"></script>

</body>
</html>
